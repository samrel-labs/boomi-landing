<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بومی · به زودی</title>

  <!-- فونت وزیر (Vazir) از CDN -->
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet" type="text/css" />

  <style>
    /* ===== متغیرهای CSS ===== */
    :root {
      --bg: #0b0a16;
      --surface: #1a1a2e;
      --border: #2a2a3e;
      --text-primary: #f0f0f4;
      --text-secondary: #a8a8b8;
      --text-muted: #6a6a7a;
      --brand-start: #f6b868;
      --brand-end: #ee7b4a;
      --shadow: rgba(0, 0, 0, 0.3);
      --input-bg: #1e1e30;
      --success: #66bb6a;
      --error: #ef5350;
      --toggle-bg: #2a2a3e;
      --toggle-icon: #f0f0f4;
    }

    /* حالت روشن (Light Mode) */
    body.light {
      --bg: #ffffff;
      --surface: #f0f0f4;
      --border: #e0e0e8;
      --text-primary: #1a1a1e;
      --text-secondary: #5a5a62;
      --text-muted: #a0a0aa;
      --shadow: rgba(0, 0, 0, 0.04);
      --input-bg: #f5f5f7;
      --toggle-bg: #e0e0e8;
      --toggle-icon: #1a1a1e;
    }

    /* ===== ریست و استایل پایه ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Vazir', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      color: var(--text-primary);
      line-height: 1.8;
      text-align: center;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .container {
      max-width: 720px;
      width: 100%;
      position: relative;
    }

    /* ===== دکمه تغییر تم ===== */
    .theme-toggle {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3rem;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text-secondary);
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px var(--shadow);
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .theme-toggle:hover {
      background: var(--border);
      color: var(--text-primary);
    }

    .theme-toggle .icon {
      font-size: 1.1rem;
      transition: transform 0.3s ease;
    }

    body.light .theme-toggle .icon {
      transform: rotate(20deg);
    }

    /* ===== برند ===== */
    .brand {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--brand-start), var(--brand-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline-block;
      margin-bottom: 0.5rem;
    }

    .brand-sub {
      display: block;
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      margin-bottom: 2rem;
    }

    /* ===== متن مرموز ===== */
    .mystic-title {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 300;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      line-height: 1.6;
    }

    .mystic-title span {
      display: block;
      font-weight: 800;
      font-size: clamp(2.4rem, 6vw, 4rem);
      background: linear-gradient(135deg, var(--brand-start), var(--brand-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 0.2rem;
    }

    .mystic-sub {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin: 0.5rem 0 2rem 0;
      opacity: 0.7;
    }

    /* ===== شمارنده ===== */
    .counter {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 2.8rem;
      flex-wrap: wrap;
    }

    .counter-item {
      background: var(--surface);
      border-radius: 1.2rem;
      padding: 0.4rem 1.2rem;
      min-width: 65px;
      border: 1px solid var(--border);
      transition: background 0.3s, border 0.3s;
    }

    .counter-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--brand-end);
      display: block;
      line-height: 1.2;
    }

    .counter-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    /* ===== فرم ===== */
    .form-wrapper {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      max-width: 480px;
      margin: 0 auto 1.2rem auto;
    }

    .form-wrapper input {
      flex: 1 1 200px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.8rem 1.5rem;
      color: var(--text-primary);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: 0.3s;
      text-align: center;
    }

    .form-wrapper input:focus {
      border-color: var(--brand-end);
      background: var(--bg);
      box-shadow: 0 0 0 3px rgba(238, 123, 74, 0.08);
    }

    .form-wrapper input::placeholder {
      color: var(--text-muted);
    }

    .form-wrapper button {
      background: linear-gradient(135deg, var(--brand-start), var(--brand-end));
      border: none;
      border-radius: 2rem;
      padding: 0.8rem 2.2rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #0b0a16;
      cursor: pointer;
      transition: 0.3s;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(238, 123, 74, 0.15);
      min-width: 140px;
    }

    .form-wrapper button:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(238, 123, 74, 0.25);
    }

    .form-wrapper button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form-feedback {
      display: block;
      font-size: 0.8rem;
      min-height: 1.6rem;
      margin: 0.2rem auto 0.8rem auto;
      color: var(--text-muted);
      transition: 0.25s;
    }

    .form-feedback.success {
      color: var(--success);
    }

    .form-feedback.error {
      color: var(--error);
    }

    /* ===== فوتر ===== */
    .footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 1.8rem;
      margin-top: 0.5rem;
      transition: border-color 0.3s;
    }

    .footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: 0.2s;
    }

    .footer a:hover {
      color: var(--brand-end);
    }

    /* ===== واکنش‌گرایی ===== */
    @media (max-width: 480px) {
      .brand { font-size: 2.4rem; }
      .counter-item { min-width: 50px; padding: 0.3rem 0.8rem; }
      .counter-number { font-size: 1.6rem; }
      .form-wrapper input { flex: 1 1 100%; text-align: center; }
      .form-wrapper button { width: 100%; }
      .theme-toggle { top: 0.8rem; left: 0.8rem; padding: 0.3rem 0.8rem; font-size: 0.7rem; }
    }
  </style>
</head>
<body>

  <!-- ===== دکمه تغییر تم ===== -->
  <button class="theme-toggle" id="themeToggle" aria-label="تغییر تم">
    <span class="icon" id="themeIcon">🌙</span>
    <span id="themeLabel">تاریک</span>
  </button>

  <div class="container">

    <!-- ===== برند ===== -->
    <div class="brand">بومی</div>
    <span class="brand-sub">— به زودی در محله‌ی تو —</span>

    <!-- ===== متن مرموز ===== -->
    <div class="mystic-title">
      <span>چیزی در راه است.</span>
    </div>
    <div class="mystic-sub">— آماده‌ای؟ —</div>

    <!-- ===== شمارنده ===== -->
    <div class="counter">
      <div class="counter-item">
        <span class="counter-number" id="days">۰۰</span>
        <span class="counter-label">روز</span>
      </div>
      <div class="counter-item">
        <span class="counter-number" id="hours">۰۰</span>
        <span class="counter-label">ساعت</span>
      </div>
      <div class="counter-item">
        <span class="counter-number" id="minutes">۰۰</span>
        <span class="counter-label">دقیقه</span>
      </div>
      <div class="counter-item">
        <span class="counter-number" id="seconds">۰۰</span>
        <span class="counter-label">ثانیه</span>
      </div>
    </div>

    <!-- ===== فرم ثبت‌نام ===== -->
    <div class="form-wrapper">
      <input type="email" id="emailInput" placeholder="ایمیل شما" aria-label="آدرس ایمیل" required />
      <button type="button" id="submitBtn">به من خبر بده</button>
    </div>
    <span class="form-feedback" id="formFeedback">— اولین‌ها خبردار می‌شوند —</span>

    <!-- ===== فوتر ===== -->
    <div class="footer">
      <span>© ۲۰۲۶ بومی</span>
      <a href="#">حریم خصوصی</a>
      <a href="#">تماس</a>
    </div>

  </div>

  <script>
    // ============================================================
    // ۱. شمارنده (۳۰ روز از امروز)
    // ============================================================
    const target = new Date();
    target.setDate(target.getDate() + 30);

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function updateCounter() {
      const diff = Math.max(0, target - new Date());
      document.getElementById('days').textContent = pad(Math.floor(diff / (1000 * 60 * 60 * 24)));
      document.getElementById('hours').textContent = pad(Math.floor((diff / (1000 * 60 * 60)) % 24));
      document.getElementById('minutes').textContent = pad(Math.floor((diff / (1000 * 60)) % 60));
      document.getElementById('seconds').textContent = pad(Math.floor((diff / 1000) % 60));
    }

    updateCounter();
    setInterval(updateCounter, 1000);

    // ============================================================
    // ۲. تغییر تم (روشن/تاریک) با ذخیره در localStorage
    // ============================================================
    const toggleBtn = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const themeLabel = document.getElementById('themeLabel');
    const body = document.body;

    // تابع برای به‌روزرسانی ظاهر دکمه
    function updateToggleUI(isDark) {
      if (isDark) {
        themeIcon.textContent = '🌙';
        themeLabel.textContent = 'تاریک';
      } else {
        themeIcon.textContent = '☀️';
        themeLabel.textContent = 'روشن';
      }
    }

    // بارگذاری تم ذخیره‌شده
    const savedTheme = localStorage.getItem('bomi-theme');
    const isDark = savedTheme === null ? true : savedTheme === 'dark';

    if (isDark) {
      body.classList.remove('light');
    } else {
      body.classList.add('light');
    }
    updateToggleUI(isDark);

    // رویداد کلیک دکمه
    toggleBtn.addEventListener('click', () => {
      const nowDark = !body.classList.contains('light');
      body.classList.toggle('light');
      localStorage.setItem('bomi-theme', nowDark ? 'light' : 'dark');
      updateToggleUI(!nowDark);
    });

    // ============================================================
    // ۳. فرم (فقط نمایشی - برای اتصال به بک‌اند بعداً)
    // ============================================================
    const emailInput = document.getElementById('emailInput');
    const submitBtn = document.getElementById('submitBtn');
    const feedback = document.getElementById('formFeedback');

    function setFeedback(message, type) {
      feedback.textContent = message;
      feedback.className = 'form-feedback';
      if (type) feedback.classList.add(type);
    }

    submitBtn.addEventListener('click', function() {
      const email = emailInput.value.trim();

      if (!email || !email.includes('@') || !email.includes('.')) {
        setFeedback('⚠️ لطفاً یک ایمیل معتبر وارد کن.', 'error');
        emailInput.focus();
        return;
      }

      this.disabled = true;
      this.textContent = 'در حال ارسال...';
      setFeedback('⏳ در حال ثبت...', '');

      // شبیه‌سازی ارسال (بعداً Webhook واقعی وصل می‌شود)
      setTimeout(() => {
        setFeedback('✅ ثبت شدی! به زودی بهت خبر می‌دیم.', 'success');
        emailInput.value = '';
        this.disabled = false;
        this.textContent = 'به من خبر بده';
      }, 1200);
    });

    emailInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitBtn.click();
      }
    });
  </script>

</body>
</html>
